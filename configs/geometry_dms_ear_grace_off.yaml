# geometry_dms.yaml 과 동일, drowsy_ear_open_grace_sec 만 0 (즉시 리셋, 비교용).
pose_model: weights/best.pt

geometry:
  stats: core/geometry_stats_4d.npz
  ood_flag_mode: soft_band
  ood_threshold: 6.0
  ood_soft_threshold: 4.0
  min_keypoint_conf: 0.5

  drowsy_sensitivity: 3

  ear_drowsy_ratio: 0.55
  yaw_distracted_deg: 30.0

  drowsy_duration_sec: 3
  distracted_duration_sec: 1
  drowsy_ear_open_grace_sec: 0

  kalman:
    process_noise: 1.0e-3
    measurement_noise: 0.08

  calibration_frames: 30

device: cuda:0
